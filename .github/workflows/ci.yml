name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No `version` here — pnpm/action-setup reads packageManager
      # from package.json (currently pnpm@10.33.0) for an exact match.
      # Specifying both was causing the v4 self-installer to abort.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec tsc --noEmit
      - run: pnpm exec eslint .
      - run: pnpm exec next build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
